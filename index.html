      {id:0,x:210,y:15,answer:"54"},{id:1,x:120,y:75,answer:"22"},{id:2,x:300,y:75,answer:"32"},
      {id:3,x:60,y:135,answer:"12"},{id:4,x:180,y:135,answer:"c:10"},{id:5,x:255,y:135,answer:"b:14"},
      {id:6,x:345,y:135,answer:"e:18"},{id:7,x:35,y:195,answer:"d:4"},{id:8,x:85,y:195,answer:"a:8"}
    ],
    explain:"构造过程：①d(4)+a(8)=12 ②12+c(10)=22 ③b(14)+e(18)=32 ④22+32=54。WPL=4×3+8×3+10×2+14×2+18×2=120。编码：d=000, a=001, c=01, b=10, e=11（左0右1）。"
  },

  // === 编程题 30 ===
  { type:"code", q:"编写一个算法，在带表头结点的单链表中寻找第i个结点。若找到，则函数返回第i个结点的地址；若找不到，则函数返回NULL。",
    code:`LNode* GetANode(LNode* &HL, int i)
{
    if (i < 1) return NULL;
    LNode* p = HL->next;    // 跳过表头结点
    int count = 1;
    while (p != NULL && count < i) {
        p = p->next;
        count++;
    }
    return p;  // p为NULL表示i超出表长
}`,
    explain:"关键点：①跳过表头结点从HL->next开始 ②count从1开始 ③i<1直接返回NULL ④循环条件p!=NULL防止越界 ⑤最终p要么指向目标结点要么为NULL。"
  }
];

// ============ STATE ============
let currentTab = 'all';
let currentIndex = 0;
let answered = {};        // {qIndex: bool}
let userAnswers = {};     // {qIndex: answer}
let treeAssignments = {}; // {qIndex: {slotId: value}}
let treeChecked = {};     // {qIndex: {slotId: bool}}
let selectedSlot = {};    // {qIndex: slotId | null}

function isGradable(q) { return q.type === 'single' || q.type === 'fill' || q.type === 'drawing'; }
function getErrorSet() {
  let s = new Set();
  for (let i = 0; i < questions.length; i++) {
    if (isGradable(questions[i]) && answered[i] === false) s.add(i);
  }
  return s;
}
function getQuestionList() {
  if (currentTab === 'all') return questions.map((_, i) => i);
  return [...getErrorSet()].sort((a,b) => a-b);
}

// ============ NAVIGATION ============
function switchTab(tab) {
  currentTab = tab; currentIndex = 0;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='all')||(i===1&&tab==='error')));
  render();
}
function goPrev() { const list=getQuestionList(); if(currentIndex>0){currentIndex--;render();} }
function goNext() { const list=getQuestionList(); if(currentIndex<list.length-1){currentIndex++;render();} }

// ============ SINGLE / FILL ============
function selectOption(qIndex, optIndex) {
  if (answered[qIndex] !== undefined) return;
  answered[qIndex] = (optIndex === questions[qIndex].answer);
  userAnswers[qIndex] = optIndex;
  updateErrorBadge(); render();
}
function submitFill(qIndex) {
  if (answered[qIndex] !== undefined) return;
  const input = document.getElementById('fillInput'); if (!input) return;
  const userAns = input.value.trim();
  const norm = s => s.replace(/\s+/g,'').toLowerCase();
  answered[qIndex] = (norm(userAns) === norm(questions[qIndex].answer));
  userAnswers[qIndex] = userAns;
  updateErrorBadge(); render();
}
function handleFillKeydown(qIndex, e) { if (e.key==='Enter') submitFill(qIndex); }

// ============ TREE STATE ============
function initTreeState(qIndex) {
  if (!treeAssignments[qIndex]) treeAssignments[qIndex] = {};
  if (!treeChecked[qIndex]) treeChecked[qIndex] = {};
  if (selectedSlot[qIndex] === undefined) selectedSlot[qIndex] = null;
}

function selectTreeSlot(qIndex, slotId) {
  initTreeState(qIndex);
  const curVal = treeAssignments[qIndex][slotId];
  if (curVal !== undefined) {
    delete treeAssignments[qIndex][slotId];
    selectedSlot[qIndex] = null;
  } else {
    selectedSlot[qIndex] = (selectedSlot[qIndex] === slotId) ? null : slotId;
  }
  // Clear previous check results on any edit
  if (Object.keys(treeChecked[qIndex]||{}).length > 0) {
    treeChecked[qIndex] = {}; answered[qIndex] = undefined; updateErrorBadge();
  }
  render();
}

function placeTreeValue(qIndex, value) {
  initTreeState(qIndex);
  const sid = selectedSlot[qIndex];
  if (sid === null || sid === undefined) return;
  treeAssignments[qIndex][sid] = value;
  selectedSlot[qIndex] = null;
  if (Object.keys(treeChecked[qIndex]||{}).length > 0) {
    treeChecked[qIndex] = {}; answered[qIndex] = undefined; updateErrorBadge();
  }
  render();
}

function checkTreeAnswer(qIndex) {
  initTreeState(qIndex);
  const q = questions[qIndex];
  const result = {}; let allCorrect = true;
  q.slots.forEach(slot => {
    const userVal = treeAssignments[qIndex][slot.id] || '';
    const ok = (userVal === slot.answer);
    result[slot.id] = ok;
    if (!ok) allCorrect = false;
  });
  treeChecked[qIndex] = result;
  answered[qIndex] = allCorrect;
  updateErrorBadge(); render();
}

function redoTree(qIndex) {
  treeAssignments[qIndex] = {};
  treeChecked[qIndex] = {};
  selectedSlot[qIndex] = null;
  answered[qIndex] = undefined;
  userAnswers[qIndex] = undefined;
  updateErrorBadge(); render();
}
function redoQuestion(qIndex) {
  answered[qIndex] = undefined; userAnswers[qIndex] = undefined;
  if (questions[qIndex].type === 'drawing') { redoTree(qIndex); return; }
  updateErrorBadge(); render();
}
function resetAll() {
  if (!confirm('确定要清除所有答题记录并重新开始吗？')) return;
  answered = {}; userAnswers = {}; treeAssignments = {}; treeChecked = {}; selectedSlot = {};
  currentIndex = 0; currentTab = 'all';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  updateErrorBadge(); render();
}
function updateErrorBadge() { document.getElementById('errorCount').textContent = getErrorSet().size; }
function escapeHtml(s) { if (!s) return ''; return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============ CANVAS TREE DRAWING ============
function drawTree(qIndex) {
  const canvas = document.getElementById('treeCanvas');
  if (!canvas) return;
  const q = questions[qIndex];
  initTreeState(qIndex);
  const assignments = treeAssignments[qIndex] || {};
  const checked = treeChecked[qIndex] || {};
  const selSlot = selectedSlot[qIndex];
  const ctx = canvas.getContext('2d');
  const W = q.vw, H = q.vh;
  const R = 16;

  ctx.clearRect(0, 0, W, H);

  // Draw lines
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1.5;
  q.lines.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.x1, l.y1);
    ctx.lineTo(l.x2, l.y2);
    ctx.stroke();
  });

  // Draw slots
  q.slots.forEach(slot => {
    const val = assignments[slot.id];
    const isFilled = val !== undefined;
    const isSel = selSlot === slot.id;
    const checkRes = checked[slot.id];

    // Determine colors
    let fill = '#fff', stroke = '#1a73e8', strokeW = 2;
    if (checkRes === true) { fill = '#e6f4ec'; stroke = '#0d904f'; strokeW = 3; }
    else if (checkRes === false) { fill = '#fce8e6'; stroke = '#d93025'; strokeW = 3; }
    else if (isSel) { fill = '#fff3e0'; stroke = '#e65100'; strokeW = 3; }
    else if (isFilled) { fill = '#e8f0fe'; strokeW = 2.5; }

    // Circle
    ctx.beginPath();
    ctx.arc(slot.x, slot.y, R, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = strokeW;
    ctx.stroke();

    // Text
    ctx.fillStyle = '#333';
    ctx.font = '600 11px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(isFilled ? val : '?', slot.x, slot.y);

    // Slot label
    ctx.fillStyle = '#aaa';
    ctx.font = '9px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillText(slot.id + 1, slot.x, slot.y + R + 13);
  });
}

// ============ CANVAS CLICK HANDLER ============
document.querySelector('.container').addEventListener('click', function(e) {
  // Tree canvas click
  if (e.target.id === 'treeCanvas') {
    const canvas = e.target;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    // Find current drawing question index
    const list = getQuestionList();
    if (list.length === 0) return;
    const qIndex = list[currentIndex];
    const q = questions[qIndex];
    if (q.type !== 'drawing') return;

    // Hit test slots
    const R = 20; // generous hit radius for touch
    let hitId = null;
    for (const slot of q.slots) {
      const dx = mx - slot.x, dy = my - slot.y;
      if (dx * dx + dy * dy <= R * R) { hitId = slot.id; break; }
    }
    if (hitId !== null) {
      selectTreeSlot(qIndex, hitId);
      return;
    }
  }

  // Palette chip click
  let chipEl = e.target;
  while (chipEl && chipEl !== document.body) {
    if (chipEl.hasAttribute && chipEl.hasAttribute('data-palette')) {
      const qIndex = parseInt(chipEl.getAttribute('data-qindex'));
      const value = chipEl.getAttribute('data-palette');
      if (!isNaN(qIndex) && value !== null) {
        placeTreeValue(qIndex, value);
        return;
      }
    }
    chipEl = chipEl.parentElement;
  }
});

// ============ RENDER ============
function render() {
  const list = getQuestionList();
  if (currentIndex >= list.length) currentIndex = Math.max(0, list.length - 1);
  if (list.length === 0) {
    document.getElementById('card').innerHTML = `<div class="empty-state"><div class="icon">&#127881;</div><p>错误集为空，全部正确！</p><button class="btn btn-outline" onclick="switchTab('all')">返回全部题目</button></div>`;
    return;
  }

  const qIndex = list[currentIndex];
  const q = questions[qIndex];
  const total = list.length;
  const isAnswered = answered[qIndex] !== undefined;
  const isCorrect = answered[qIndex];
  const typeLabels = { single:'单选题', fill:'填空题', drawing:'作图题', code:'编程题' };

  let h = '';
  h += `<div class="progress"><span>第 ${currentIndex+1} / ${total} 题</span><span>${typeLabels[q.type]}</span></div>`;
  h += `<div class="progress-bar"><div class="progress-fill" style="width:${(currentIndex+1)/total*100}%"></div></div>`;
  const tagCls = q.type==='drawing'?'drawing-tag':q.type==='code'?'code-tag':'';
  h += `<div class="question-type ${tagCls}">${typeLabels[q.type]}</div>`;
  h += `<div class="question-text"><strong>${qIndex+1}.</strong> ${q.q}</div>`;

  // --- Single choice ---
  if (q.type === 'single') {
    h += `<div class="options">`;
    q.options.forEach((opt, oi) => {
      let cls = 'option';
      if (isAnswered) {
        if (oi === q.answer) cls += ' correct';
        else if (userAnswers[qIndex] === oi && !isCorrect) cls += ' wrong';
        cls += ' disabled';
      }
      h += `<div class="${cls}" onclick="selectOption(${qIndex},${oi})">${opt}</div>`;
    });
    h += `</div>`;
  }

  // --- Fill ---
  else if (q.type === 'fill') {
    const dis = isAnswered ? 'disabled' : '';
    const cls = isAnswered ? (isCorrect?'correct':'wrong') : '';
    const val = userAnswers[qIndex] !== undefined ? userAnswers[qIndex] : '';
    h += `<input type="text" id="fillInput" class="fill-input ${cls} ${dis}" placeholder="请输入答案..." value="${escapeHtml(val)}" ${dis} onkeydown="handleFillKeydown(${qIndex},event)">`;
    if (!isAnswered) h += `<br><button class="btn btn-blue" style="margin-top:10px" onclick="submitFill(${qIndex})">提交答案</button>`;
  }

  // --- Drawing (canvas) ---
  else if (q.type === 'drawing') {
    initTreeState(qIndex);
    const checkedAny = Object.keys(treeChecked[qIndex]||{}).length > 0;
    const selSlot = selectedSlot[qIndex];
    const assignments = treeAssignments[qIndex] || {};

    h += `<div class="tree-area"><canvas id="treeCanvas" width="${q.vw}" height="${q.vh}"></canvas></div>`;
    if (!checkedAny) {
      h += `<div class="tree-hint">👆 先点击树中<strong>空位</strong>(?)选中，再点击下方<strong>结点值</strong>填入。（点击已填位置可移除）</div>`;
    } else {
      h += `<div class="tree-hint" style="color:#0d904f">✅ 已检查 — 绿色正确，红色需修正</div>`;
    }

    // Palette
    const usedVals = new Set();
    q.slots.forEach(s => { if (assignments[s.id] !== undefined) usedVals.add(assignments[s.id]); });

    const valueCount = {};
    q.slots.forEach(s => { valueCount[s.answer] = (valueCount[s.answer]||0) + 1; });
    const placedCount = {};
    q.slots.forEach(s => { if (assignments[s.id] !== undefined) placedCount[assignments[s.id]] = (placedCount[assignments[s.id]]||0) + 1; });

    h += `<div class="palette">`;
    [...new Set(q.slots.map(s => s.answer))].forEach(val => {
      const needed = valueCount[val] || 0;
      const placed = placedCount[val] || 0;
      const remaining = needed - placed;
      const isExhausted = remaining <= 0;
      const isHighlight = !isExhausted && selSlot !== null;
      h += `<div class="palette-chip${isExhausted?' used':''}${isHighlight?' highlight':''}" data-qindex="${qIndex}" data-palette="${escapeHtml(val)}">${escapeHtml(val)}${needed>1?` (×${remaining})`:''}</div>`;
    });
    h += `</div>`;

    // Buttons
    h += `<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">`;
    if (!checkedAny) {
      h += `<button class="btn btn-orange" onclick="checkTreeAnswer(${qIndex})">✅ 检查答案</button>`;
    }
    h += `<button class="btn btn-outline" onclick="redoTree(${qIndex})" style="font-size:0.85rem;">🔄 重做本题</button>`;
    h += `</div>`;
  }

  // --- Code ---
  else if (q.type === 'code') {
    h += `<p style="color:#888;font-size:0.9rem;margin-bottom:8px;">💻 本题为编程题，请先自己编写，再点击查看参考代码。</p>`;
    if (!isAnswered) h += `<button class="btn btn-orange" onclick="answered[${qIndex}]=true;render();">📖 显示参考代码</button>`;
  }

  // --- Answer reveal: single/fill ---
  if (isAnswered && (q.type === 'single' || q.type === 'fill')) {
    const cls = isCorrect ? 'correct-ans' : 'wrong-ans';
    const icon = isCorrect ? '✅' : '❌';
    const ansDisp = q.type === 'single' ? q.options[q.answer] : q.answer;
    h += `<div class="answer-reveal show ${cls}">
      ${icon} <strong>${isCorrect?'回答正确':'回答错误'}</strong> &nbsp;正确答案：${escapeHtml(ansDisp)}
      ${q.explain?`<br><span style="font-size:0.85rem;opacity:0.9;">📖 ${q.explain}</span>`:''}
      <br><button class="btn btn-outline" style="margin-top:8px;font-size:0.8rem;padding:6px 16px;" onclick="redoQuestion(${qIndex})">🔄 重做本题</button>
    </div>`;
  }

  // --- Answer reveal: drawing ---
  if (q.type === 'drawing' && isAnswered !== undefined) {
    h += `<div class="answer-reveal show ${isCorrect?'correct-ans':'wrong-ans'}">
      ${isCorrect?'✅ 全部正确！':'❌ 有错误（红色标记），点击错误位置修正后重新检查'}
      ${q.explain?`<br><span style="font-size:0.85rem;opacity:0.9;">📖 ${q.explain}</span>`:''}
    </div>`;
  }

  // --- Answer reveal: code ---
  if (isAnswered && q.type === 'code' && q.code) {
    h += `<div class="answer-reveal show info-ans">
      <strong>💻 参考代码：</strong><div class="code-block">${escapeHtml(q.code)}</div>
      ${q.explain?`<span style="font-size:0.85rem;">📖 ${q.explain}</span>`:''}
      <br><button class="btn btn-outline" style="margin-top:8px;font-size:0.8rem;padding:6px 16px;" onclick="redoQuestion(${qIndex})">🔄 隐藏答案</button>
    </div>`;
  }

  // --- Nav ---
  h += `<div class="nav">
    <button class="btn-prev" onclick="goPrev()" ${currentIndex===0?'disabled':''}>⬅ 上一题</button>
    <button class="btn-next" onclick="goNext()" ${currentIndex>=total-1?'disabled':''}>下一题 ➡</button>
  </div>`;

  document.getElementById('card').innerHTML = h;

  // Draw canvas AFTER innerHTML sets up the DOM
  if (q.type === 'drawing') {
    drawTree(qIndex);
  }
}

// ============ INIT ============
render();
</script>
</body>
</html>
